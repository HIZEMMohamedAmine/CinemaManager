<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un film</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 30px 16px 60px;
        }

        .header {
            max-width: 900px;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header h1 {
            color: #e94560;
            font-size: 2.1rem;
            text-shadow: 0 0 18px rgba(233, 69, 96, 0.35);
        }

        .header p {
            color: #a0a0a0;
            margin-top: 6px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
            color: #fff;
            background: rgba(255, 255, 255, 0.10);
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
        }

        .card {
            max-width: 900px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1e1e2e, #252538);
            border-radius: 18px;
            padding: 26px;
            border: 1px solid rgba(233, 69, 96, 0.28);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }

        .full { grid-column: 1 / -1; }

        label {
            color: #a0a0a0;
            font-size: 0.92rem;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.10);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, background 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.08);
        }

        select option { background: #1e1e2e; color: #fff; }

        textarea { min-height: 90px; resize: vertical; }

        .showtimes-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .showtimes-row input[type="time"] {
            width: 160px;
        }

        .showtimes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tag {
            background: rgba(233, 69, 96, 0.18);
            border: 1px solid #e94560;
            color: #e94560;
            border-radius: 999px;
            padding: 6px 12px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .tag button {
            border: 0;
            background: none;
            color: #e94560;
            cursor: pointer;
            font-size: 1.05rem;
            line-height: 1;
        }

        .hint { color: #a0a0a0; font-size: 0.9rem; margin-top: 6px; }

        .status {
            margin-top: 14px;
            color: #a0a0a0;
            font-size: 0.95rem;
            min-height: 1.2em;
        }

        @media (max-width: 680px) {
            .form-grid { grid-template-columns: 1fr; }
            .showtimes-row input[type="time"] { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>CineManager</h1>
            <p>Formulaire d'ajout d'un nouveau film</p>
        </div>
        <div class="actions">
            <a class="btn" href="films.html" target="_self">Retour</a>
        </div>
    </div>

    <div class="card">
        <form id="filmForm" novalidate>
            <div class="form-grid">
                <div class="form-group full">
                    <label for="title">Titre du film *</label>
                    <input id="title" name="title" type="text" required placeholder="Ex: The Dark Knight">
                </div>

                <div class="form-group">
                    <label for="genre">Genre *</label>
                    <select id="genre" name="genre" required>
                        <option value="">Sélectionner</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comédie</option>
                        <option value="Drama">Drame</option>
                        <option value="Horror">Horreur</option>
                        <option value="Sci-Fi">Science-fiction</option>
                        <option value="Romance">Romance</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Animation">Animation</option>
                        <option value="Documentary">Documentaire</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="duration">Durée (minutes) *</label>
                    <input id="duration" name="duration" type="number" min="1" required placeholder="120">
                </div>

                <div class="form-group">
                    <label for="rating">Classification *</label>
                    <select id="rating" name="rating" required>
                        <option value="">Sélectionner</option>
                        <option value="G">G - Tout public</option>
                        <option value="PG">PG</option>
                        <option value="PG-13">PG-13</option>
                        <option value="R">R</option>
                        <option value="NC-17">NC-17</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="poster">URL affiche (optionnel)</label>
                    <input id="poster" name="poster" type="url" placeholder="https://.../poster.jpg">
                </div>

                <div class="form-group full">
                    <label>Séances (horaires) *</label>
                    <div class="showtimes-row">
                        <input id="showtimeInput" type="time" aria-label="Horaire">
                        <button class="btn" type="button" id="addShowtimeBtn">+ Ajouter horaire</button>
                        <button class="btn" type="button" id="clearShowtimesBtn">Vider</button>
                    </div>
                    <div class="showtimes" id="showtimesContainer" aria-live="polite"></div>
                    <div class="hint">Ajoute au moins un horaire (ex: 14:30).</div>
                </div>

                <div class="form-group full">
                    <label for="synopsis">Synopsis (optionnel)</label>
                    <textarea id="synopsis" name="synopsis" placeholder="Brève description..."></textarea>
                </div>

                <div class="form-group full">
                    <button class="btn btn-primary" type="submit">Enregistrer le film</button>
                    <div class="status" id="status"></div>
                </div>
            </div>
        </form>
    </div>

    <script>
        (function () {
            'use strict';

            const STORAGE_KEY = 'cinemaFilms';

            const filmForm = document.getElementById('filmForm');
            const statusEl = document.getElementById('status');

            const showtimeInput = document.getElementById('showtimeInput');
            const addShowtimeBtn = document.getElementById('addShowtimeBtn');
            const clearShowtimesBtn = document.getElementById('clearShowtimesBtn');
            const showtimesContainer = document.getElementById('showtimesContainer');

            let currentShowtimes = [];

            function setStatus(message, isError) {
                statusEl.textContent = message || '';
                statusEl.style.color = isError ? '#ffb3b3' : '#a0a0a0';
            }

            function loadFilms() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    const parsed = raw ? JSON.parse(raw) : [];
                    return Array.isArray(parsed) ? parsed : [];
                } catch {
                    return [];
                }
            }

            function saveFilms(films) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(films));
            }

            function normalizeTime(time) {
                if (!time) return '';
                const t = String(time).trim();
                return /^([0-1]\d|2[0-3]):[0-5]\d$/.test(t) ? t : '';
            }

            function renderShowtimes() {
                showtimesContainer.innerHTML = '';

                currentShowtimes
                    .slice()
                    .sort()
                    .forEach((t) => {
                        const tag = document.createElement('span');
                        tag.className = 'tag';
                        tag.textContent = t;

                        const removeBtn = document.createElement('button');
                        removeBtn.type = 'button';
                        removeBtn.setAttribute('aria-label', `Supprimer ${t}`);
                        removeBtn.textContent = '×';
                        removeBtn.addEventListener('click', () => {
                            currentShowtimes = currentShowtimes.filter((x) => x !== t);
                            renderShowtimes();
                            setStatus('', false);
                        });

                        tag.appendChild(removeBtn);
                        showtimesContainer.appendChild(tag);
                    });
            }

            function addShowtime() {
                const time = normalizeTime(showtimeInput.value);
                if (!time) {
                    setStatus('Horaire invalide. Utilise le format HH:MM.', true);
                    return;
                }
                if (currentShowtimes.includes(time)) {
                    setStatus('Cet horaire existe déjà.', true);
                    return;
                }
                currentShowtimes.push(time);
                showtimeInput.value = '';
                renderShowtimes();
                setStatus('', false);
            }

            addShowtimeBtn.addEventListener('click', addShowtime);
            showtimeInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addShowtime();
                }
            });

            clearShowtimesBtn.addEventListener('click', () => {
                currentShowtimes = [];
                renderShowtimes();
                setStatus('', false);
            });

            filmForm.addEventListener('submit', (e) => {
                e.preventDefault();
                setStatus('', false);

                const formData = new FormData(filmForm);
                const title = String(formData.get('title') || '').trim();
                const genre = String(formData.get('genre') || '').trim();
                const durationValue = Number(formData.get('duration'));
                const rating = String(formData.get('rating') || '').trim();
                const poster = String(formData.get('poster') || '').trim();
                const synopsis = String(formData.get('synopsis') || '').trim();

                if (!title || !genre || !rating || !Number.isFinite(durationValue) || durationValue <= 0) {
                    setStatus('Merci de remplir tous les champs obligatoires (*).', true);
                    return;
                }

                if (currentShowtimes.length === 0) {
                    setStatus('Ajoute au moins un horaire (séance).', true);
                    return;
                }

                const films = loadFilms();
                const film = {
                    id: Date.now(),
                    title,
                    genre,
                    duration: Math.round(durationValue),
                    rating,
                    poster: poster || '',
                    showtimes: currentShowtimes.slice().sort(),
                    synopsis,
                    addedAt: new Date().toISOString()
                };

                films.push(film);
                saveFilms(films);

                filmForm.reset();
                currentShowtimes = [];
                renderShowtimes();

                setStatus(`Film ajouté: "${film.title}"`, false);
            });

            renderShowtimes();
        })();
    </script>
</body>
</html>
