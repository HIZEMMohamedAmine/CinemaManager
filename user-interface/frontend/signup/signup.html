<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../login/style.css" />
</head>

<body>

  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>
  <div class="grid"></div>

  <div class="card">

    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <h1 id="card-title">Inscription</h1>
      <p class="subtitle" id="card-sub">Créez votre compte CinemaManager</p>
    </div>

    <!-- Form -->
    <form id="signup-form" onsubmit="handleSignup(event)">

      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Choisissez un pseudo..." required autocomplete="username" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <button type="button" class="eye-btn" id="eye-btn" onclick="togglePwd()" title="Afficher/masquer">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirmer le mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn" style="margin-top: 20px;">
        Créer mon compte
      </button>

    </form>

    <div class="divider">ou</div>

    <div class="card-footer">
      Déjà un compte ? <a href="../login/login.html">Se connecter</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="signup.js"></script>
</body>

</html>
